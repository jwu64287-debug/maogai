<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>毛概题库｜网页刷题版</title>
<style>
  :root {
    --bg: #f6f3ef;
    --card: rgba(255,255,255,.86);
    --text: #1f2937;
    --muted: #6b7280;
    --line: rgba(31,41,55,.12);
    --brand: #9b1c31;
    --brand-2: #c75d69;
    --good: #15803d;
    --bad: #b91c1c;
    --warn: #b45309;
    --shadow: 0 22px 60px rgba(45, 35, 30, .12);
    --radius: 22px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; color: var(--text); background: radial-gradient(circle at top left, #fff 0, #f7eee9 28%, var(--bg) 70%); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  body { padding: 22px; }
  .app { max-width: 1160px; margin: 0 auto; }
  .hero { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; margin-bottom: 18px; }
  h1 { margin: 0; font-size: clamp(28px, 4vw, 48px); letter-spacing: -.04em; line-height: 1.05; }
  .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.68); font-size: 13px; color: #374151; }
  .panel { background: var(--card); border: 1px solid rgba(255,255,255,.58); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(14px); }
  .topbar { padding: 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 16px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; border: 0; }
  .btn { border-radius: 999px; padding: 10px 14px; background: #fff; color: #374151; border: 1px solid var(--line); transition: .18s ease; }
  .btn:hover { transform: translateY(-1px); border-color: rgba(155,28,49,.35); }
  .btn.active, .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn.ghost { background: transparent; }
  .btn.good { background: #e8f7ed; color: var(--good); border-color: rgba(21,128,61,.2); }
  .btn.bad { background: #fff1f1; color: var(--bad); border-color: rgba(185,28,28,.22); }
  .searchbox { display:flex; align-items:center; gap:8px; justify-self: end; min-width: min(360px, 100%); }
  .searchbox input { width: 100%; padding: 11px 14px; border-radius: 999px; border: 1px solid var(--line); background: #fff; outline: none; }
  .grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; }
  .quiz { padding: 24px; min-height: 560px; position: relative; overflow: hidden; }
  .quiz::before { content:""; position:absolute; right:-90px; top:-90px; width: 260px; height:260px; border-radius: 50%; background: rgba(155,28,49,.08); pointer-events:none; }
  .meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom: 16px; }
  .pill { display:inline-flex; gap:6px; align-items:center; border-radius:999px; padding:6px 10px; background:#f8fafc; color:#4b5563; border:1px solid var(--line); font-size:13px; }
  .star { margin-left:auto; border-radius:999px; width:42px; height:38px; background:#fff; border:1px solid var(--line); font-size:20px; }
  .star.on { color:#d97706; background:#fff7ed; }
  .question { font-size: 22px; font-weight: 760; line-height: 1.52; margin: 0 0 22px; white-space: pre-wrap; }
  .options { display: grid; gap: 12px; margin: 18px 0; }
  .option { position: relative; display: grid; grid-template-columns: 40px 1fr; gap: 12px; align-items: start; padding: 15px 16px; border: 1px solid var(--line); background: #fff; border-radius: 18px; text-align: left; min-height: 58px; transition: .15s ease; }
  .option:hover { border-color: rgba(155,28,49,.36); box-shadow: 0 12px 24px rgba(155,28,49,.06); }
  .option.selected { border-color: var(--brand); background: #fff6f7; }
  .option.correct { border-color: rgba(21,128,61,.8); background: #dcfce7; box-shadow: inset 0 0 0 1px rgba(21,128,61,.22); }
  .option.wrong { border-color: rgba(185,28,28,.85); background: #fee2e2; box-shadow: inset 0 0 0 1px rgba(185,28,28,.22); }
  .option.missed-correct { border-style: solid; }
  .option.picked-wrong { animation: shake .18s linear 2; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 33%{transform:translateX(-3px)} 66%{transform:translateX(3px)} }
  .key { display:inline-flex; align-items:center; justify-content:center; width: 32px; height: 32px; border-radius: 999px; background: #f3f4f6; font-weight: 800; color:#4b5563; }
  .option.selected .key { background: var(--brand); color: #fff; }
  .option.correct .key { background: var(--good); color:#fff; }
  .option.wrong .key { background: var(--bad); color:#fff; }
  .resultTag { display: inline-flex; margin-left: 8px; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 800; vertical-align: middle; }
  .resultTag.good { background: rgba(21,128,61,.12); color: var(--good); }
  .resultTag.bad { background: rgba(185,28,28,.12); color: var(--bad); }
  .actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top: 22px; }
  .actions .spacer { flex: 1; }
  .answerbox { margin-top: 16px; padding: 16px; background: #fff; border: 1px solid var(--line); border-radius: 18px; }
  .answerbox textarea, .answerbox input { width:100%; min-height: 52px; padding: 13px 14px; border-radius: 14px; border:1px solid var(--line); outline:none; background:#fff; }
  .answerbox textarea { min-height: 150px; resize: vertical; }
  .reference { margin-top: 12px; padding: 14px; border-radius: 14px; background: #f8fafc; line-height: 1.65; white-space: pre-wrap; display:none; }
  .inlineFeedback { margin-top: 14px; padding: 13px 15px; border-radius: 14px; background: #f8fafc; border: 1px solid var(--line); line-height: 1.6; white-space: pre-wrap; display:none; }
  .inlineFeedback.good { background: #e8f7ed; color: var(--good); border-color: rgba(21,128,61,.2); }
  .inlineFeedback.bad { background: #fff1f1; color: var(--bad); border-color: rgba(185,28,28,.22); }
  .inlineFeedback.info { background: #f8fafc; color: #374151; }
  .side { display:grid; gap: 16px; align-content:start; }
  .stats { padding: 18px; }
  .statgrid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { padding: 14px; background:#fff; border:1px solid var(--line); border-radius: 16px; }
  .num { font-size: 28px; font-weight: 850; line-height: 1; color: var(--brand); }
  .label { margin-top:6px; font-size: 12px; color: var(--muted); }
  .progress { height: 10px; background: rgba(31,41,55,.08); border-radius: 999px; overflow:hidden; margin: 16px 0 2px; }
  .bar { height:100%; width:0%; background: linear-gradient(90deg, var(--brand), var(--brand-2)); border-radius:999px; transition:.25s ease; }
  .jump { padding: 18px; }
  .jump input { width:100%; padding: 12px 14px; border-radius: 14px; border:1px solid var(--line); margin-top: 10px; }
  .hint { color: var(--muted); font-size: 13px; line-height:1.5; }
  .list { padding: 18px; max-height: 320px; overflow:auto; }
  .mini { display:flex; justify-content:space-between; gap:8px; align-items:center; padding:10px 0; border-bottom:1px dashed var(--line); font-size:13px; }
  .mini button { color: var(--brand); background:transparent; }
  dialog { border: 0; padding: 0; border-radius: 24px; max-width: min(520px, calc(100vw - 30px)); box-shadow: 0 30px 100px rgba(0,0,0,.28); background:#fff; }
  dialog::backdrop { background: rgba(15,23,42,.28); backdrop-filter: blur(4px); }
  .modal { padding: 24px; }
  .modal h2 { margin:0 0 10px; font-size: 28px; }
  .modal p { margin: 8px 0; color:#4b5563; line-height:1.6; }
  .modal .ans { margin: 14px 0; padding: 14px; border-radius: 16px; background:#f8fafc; line-height:1.65; white-space:pre-wrap; }
  .modalActions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
  .empty { padding: 70px 20px; text-align:center; color: var(--muted); }
  kbd { border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:1px 6px; background:#fff; font-size:12px; }
  @media (max-width: 900px) {
    body { padding: 12px; }
    .hero, .topbar, .grid { grid-template-columns: 1fr; }
    .searchbox { justify-self: stretch; min-width: 0; }
    .quiz { padding: 18px; min-height: auto; }
    .question { font-size: 19px; }
    .side { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div>
      <h1>毛概题库刷题版</h1>
      <div class="sub">文字版，无图片。支持单选、多选、填空、判断和必背文字题；错题、收藏和进度会自动保存在本浏览器。</div>
    </div>
    <div class="badge" id="totalBadge">载入中…</div>
  </header>

  <section class="panel topbar">
    <div class="filters" id="filters">
      <button class="btn active" data-filter="all">全部</button>
      <button class="btn" data-filter="单选题">单选</button>
      <button class="btn" data-filter="多选题">多选</button>
      <button class="btn" data-filter="填空题">填空</button>
      <button class="btn" data-filter="判断题">判断</button>
      <button class="btn" data-filter="文字题">文字题</button>
      <button class="btn" data-filter="wrong">错题本</button>
      <button class="btn" data-filter="fav">收藏</button>
      <button class="btn ghost" id="shuffleBtn">随机顺序</button>
    </div>
    <div class="searchbox"><input id="search" placeholder="搜索题干/答案/题号，例如 120、社会主义、文字3" /></div>
  </section>

  <main class="grid">
    <section class="panel quiz" id="quiz"></section>
    <aside class="side">
      <section class="panel stats">
        <div class="statgrid">
          <div class="stat"><div class="num" id="doneNum">0</div><div class="label">已作答</div></div>
          <div class="stat"><div class="num" id="rightNum">0</div><div class="label">正确</div></div>
          <div class="stat"><div class="num" id="wrongNum">0</div><div class="label">错题</div></div>
          <div class="stat"><div class="num" id="rateNum">0%</div><div class="label">正确率</div></div>
        </div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <p class="hint" id="progressText">尚未开始。</p>
        <div class="actions"><button class="btn bad" id="resetBtn">清空记录</button><button class="btn" id="exportBtn">导出错题</button></div>
      </section>
      <section class="panel jump">
        <strong>快速跳题</strong>
        <input id="jumpInput" placeholder="输入题号，如 88 / 文字12" />
        <p class="hint">快捷键：<kbd>←</kbd>/<kbd>→</kbd> 上一题/下一题，<kbd>Enter</kbd> 提交或跳转。</p>
      </section>
      <section class="panel list">
        <strong>当前列表</strong>
        <div id="miniList"></div>
      </section>
    </aside>
  </main>
</div>

<dialog id="resultDialog">
  <div class="modal">
    <h2 id="modalTitle">结果</h2>
    <p id="modalText"></p>
    <div class="ans" id="modalAns"></div>
    <div class="modalActions">
      <button class="btn" id="closeModal">继续看本题</button>
      <button class="btn primary" id="modalNext">下一题</button>
    </div>
  </div>
</dialog>

<script>

d": 464, "no": 464, "type": "判断题", "source": "题库", "question": "改革不是对原有经济体制细枝末节的修补,而是一场全面的社会变革。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 465, "no": 465, "type": "判断题", "source": "题库", "question": "改革是对我国经济体制、政治体制的根本性变革。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 466, "no": 466, "type": "判断题", "source": "题库", "question": "社会主义市场经济体制是社会主义基本制度与市场经济的结合。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 467, "no": 467, "type": "判断题", "source": "题库", "question": "社会主义精神文明是社会主义社会的重要特征。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 468, "no": 468, "type": "判断题", "source": "题库", "question": "邓小平理论指导了中国革命的伟大实践。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 469, "no": 469, "type": "判断题", "source": "题库", "question": "自力更生、艰苦创业是我们党的优良传统,是实现社会主义初级阶段奋斗目标的根\n本立足点。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 470, "no": 470, "type": "判断题", "source": "题库", "question": "邓小平提出实现现代化的关键是科学技术。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 471, "no": 471, "type": "判断题", "source": "题库", "question": "“三个代表”重要思想是在建设中国特色社会主义伟大实践的基础上形成的。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 472, "no": 472, "type": "判断题", "source": "题库", "question": "贯彻“三个代表”要求,关键在保持党的先进性,核心在坚持与时俱进,本质在坚持执政\n为民。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 473, "no": 473, "type": "判断题", "source": "题库", "question": "广大工人、农民、知识分子始终是推动我国先进生产力发展和社会全面进步的根本\n力ᰁ。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 474, "no": 474, "type": "判断题", "source": "题库", "question": "科学技术是第一生产力,是先进生产力的集中体现和主要标志。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 475, "no": 475, "type": "判断题", "source": "题库", "question": "发展社会主义先进文化,就是发展面向工业化、面向世界、面向未来的,民族的科学\n的大众的社会主义文化。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 476, "no": 476, "type": "判断题", "source": "题库", "question": "思想政治工作是经济工作和其他一切工作的生命线,是我们党和社会主义国家的重\n要政治优势。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 477, "no": 477, "type": "判断题", "source": "题库", "question": "党的全部任务和责任,就是为实现中国梦。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 478, "no": 478, "type": "判断题", "source": "题库", "question": "全面建成小康社会是实现现代化建设第二步战略目标必经的承上启下的发展阶段。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 479, "no": 479, "type": "判断题", "source": "题库", "question": "党的十六大报告中,江泽民把社会主义物质文明、政治文明、精神文明、生态文明\n一起确立为社会主义现代化全面发展的四大基本目标。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 480, "no": 480, "type": "判断题", "source": "题库", "question": "坚决反对和防止腐败是全党一项重大的政治任务,是关系党和国家生死存亡的严重\n政治斗争。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 481, "no": 481, "type": "判断题", "source": "题库", "question": "科学发展观是在深刻把握我国基本国情和新的阶段性特征的基础上形成和发展起来\n的。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 482, "no": 482, "type": "判断题", "source": "题库", "question": "当今世界发展大势、国外发展的经验教训,是科学发展观形成的时代背景。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 483, "no": 483, "type": "判断题", "source": "题库", "question": "以人为本是科学发展观的核心立场,集中体现了马克思主义历史唯物论的基本原理,\n体现了我们党全心全意为人民服务的根本宗旨和推动经济社会发展的根本目的。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 484, "no": 484, "type": "判断题", "source": "题库", "question": "建设资源节约型社会的核心是加强节能减排和生态保护工作。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 485, "no": 485, "type": "判断题", "source": "题库", "question": "新形势下,党面临着执政考验、改革开放考验、市场经济考验、军事实力的考验。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 486, "no": 486, "type": "判断题", "source": "题库", "question": "安定友序,就是全社会互帮互助、诚实守信,全体人民平等友爱、融洽相处。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 487, "no": 487, "type": "判断题", "source": "题库", "question": "社会主义核心价值体系是根源于民族优秀文化和马克思主义文化发展起来的。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 488, "no": 488, "type": "判断题", "source": "题库", "question": "发展社会主义民主政治,最重要的就是要坚持好、发展好适合我国国情的社会主义\n道路。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 489, "no": 489, "type": "判断题", "source": "题库", "question": "科学发展观强调,全面深化经济体制改革是加快转变经济发展方式的关键。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 490, "no": 490, "type": "判断题", "source": "题库", "question": "我们推进发展的根本目的就是造福人民。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 491, "no": 491, "type": "判断题", "source": "题库", "question": "发展不平衡,主要指各区域各领域各方面发展不平衡,制约了全国发展水平提升。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 492, "no": 492, "type": "判断题", "source": "题库", "question": "经济建设取得重大成就表现在,经济保持高速增长,综合国力和国际影响力显著提\n升。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 493, "no": 493, "type": "判断题", "source": "题库", "question": "实施共建“一带一路”倡议,倡导构建人类命运共同体,促进全球治理体系变革,为世界\n和平与发展作出新的重大贡献。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 494, "no": 494, "type": "判断题", "source": "题库", "question": "我国社会主要矛盾的变化,没有改变我们对我国社会主义所处历史阶段的判断,我国\n仍处于并将长期处于社会主义初级阶段的基本国情没有变,我国是世界最大发展中国家的国际地\n位没有变。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 495, "no": 495, "type": "判断题", "source": "题库", "question": "实现中国梦离不开世界和平发展的国际环境,世界的发展也需要中国,作为世界上的\n发达国家和第一大经济体,新时代的中国有责任也有能力为人类繁荣与进步作出新的更大贡献。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 496, "no": 496, "type": "判断题", "source": "题库", "question": "人民是历史的创造者,是决定党和国家前途命运的根本力ᰁ。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 497, "no": 497, "type": "判断题", "source": "题库", "question": "增进民生福祉是发展的根本目的。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 498, "no": 498, "type": "判断题", "source": "题库", "question": "必须以党章为根本遵循,把党的思想建设摆在首位,政治建设和制度治党同向发力,统\n筹推进党的各项建设。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 499, "no": 499, "type": "判断题", "source": "题库", "question": "习近平新时代中国特色社会主义思想聚焦的历史追问是“如何实现中国梦”。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "错"}, {"id": 500, "no": 500, "type": "判断题", "source": "题库", "question": "习近平新时代中国特色社会主义思想为全面从严治党、把党建设成为中国特色社会\n主义事业的坚强领导核心提供了强大思想武器。", "options": [{"key": "对", "text": "对"}, {"key": "错", "text": "错"}], "answer": "对"}, {"id": 501, "no": "文字1", "type": "文字题", "source": "必背20题", "question": "毛泽东思想[简答题高频]", "answer": "毛泽东思想是马克思主义中国化第一次历史性飞跃的理论成果,是马克思列宁\n主义在中国的运用和发展,是被实践证明了的关于中国革命和建设的正确的理\n论原则和经验总结,是中国共产党集体智慧的结晶。"}, {"id": 502, "no": "文字2", "type": "文字题", "source": "必背20题", "question": "新民主主义革命三大法宝[毛]", "answer": "关于统一战线、武装斗争、党的建设三大法宝之间的关系。\n毛泽东指出,统一战线和武装斗争,是战胜敌人的两个基本武器。\n统一战线,是实行武装斗争的\n统一战线;\n武装斗争是统一战线的中心支柱,而党的组织;\n则是掌握统一战线和武装斗争这两个武器以实行对敌冲锋陷阵的英勇战士。"}, {"id": 503, "no": "文字3", "type": "文字题", "source": "必背20题", "question": "新民主主义革命的纲领[毛-很重要]", "answer": "(1) 经济纲领,即没收封建地主阶级的土地归农民所有,没收官僚资产阶级\n的垄断资本归新民主主义国家所有,\n保护民族工商业。\n(2) 文化纲领,无产阶级领导的人民大众的反帝反封建的文化,就是民族\n的、科学的、大众的文化。\n(3) 政治纲领,推翻帝国主义和封建主义的统治,建立一个工人阶级领导\n的、以工农联盟为基础的、各革命阶级联合专政的新民主主义的共和国。"}, {"id": 504, "no": "文字4", "type": "文字题", "source": "必背20题", "question": "社会主义的本质。[邓]", "answer": "1992 年年初,邓小平在南方谈话中对社会主义本质作了总结性理论概括:\n“社会主义的本质,是解放生产力,发展生产力,消灭剥削,消除两极分化,\n最终达到共同富裕。”"}, {"id": 505, "no": "文字5", "type": "文字题", "source": "必背20题", "question": "简述农业合作化的方针、政策和方法[毛]", "answer": "(1) 积极引导农民组织起来,走互助合作道路。\n(2) 遵循自愿互利、典型示范和国家帮助的原则,发挥农民积极分子的带头\n和示范作用,以互助合作的优越性吸引农民走互助合作道路。\n(3) 正确分析农村的阶级和阶层状况,制定正确的阶级政策。\n(4) 坚持积极领导、稳步前进的方针,采取循序渐进的步骤。"}, {"id": 506, "no": "文字6", "type": "文字题", "source": "必背20题", "question": "为什么以经济建设为中心?[邓]", "answer": "(1) “以经济建设为中心”回答了社会主义的根本任务问题,体现了发展生产\n力的本质要求;\n(2) 以经济建设为中心的确定,是我们党根据社会主义初级阶段的主要矛\n盾,即人民日益增长的物质文化需要同落后的社会生产之间的矛盾得出的科学\n判断,是党在新时期实现的最根本\n的拨乱反正;\n(3) 以经济建设为中心是兴国之要,是党和国家兴旺发达、长治久安的根\n本要求。"}, {"id": 507, "no": "文字7", "type": "文字题", "source": "必背20题", "question": "简述“三步走”战略,基本实现现代化发展战略的内容。[邓]", "answer": "我国经济建设的战略部署大体上分三步走:\n第一步,从 1981 年到 1990 年实现国民生产总值比 1980 年翻一番,解决人民\n的温饱问题;\n第二步,从 1991 年到 20 世纪末,使国民生产总值再翻一番,达到小康水平;\n第三步,到 21 世纪中叶,国民生产\n总值再翻两番,达到中等发达国家水平,基本实现现代化。然后在这个基础上\n继续前进。"}, {"id": 508, "no": "文字8", "type": "文字题", "source": "必背20题", "question": "社会主义初级阶段基本路线。[邓]", "answer": "党的十三大提出了党在社会主义初级阶段的基本路线,即领导和团结全国各族\n人民,以经济建设为中心,坚持四项基本原则,坚持改革开放,自力更生,艰\n苦创业,为把我国建设成为富强民主文明的社会主义现代化国家而奋斗。"}, {"id": 509, "no": "文字9", "type": "文字题", "source": "必背20题", "question": "新民主主义革命总路线。[毛-重要]", "answer": "1948 年,毛泽东在晋绥干部会议上的讲话中,将新民主主义革命总路线概括\n为:无产阶级领导的,人民大众的,反对帝国主义、封建主义和官僚资本主义\n的革命。"}, {"id": 510, "no": "文字10", "type": "文字题", "source": "必背20题", "question": "毛泽东思想的科学内涵[毛]", "answer": "毛泽东思想是马克思主义中国化第一次历史性飞跃的理论成果,是马克思列宁\n主义在中国的运用和发展,是被实践证明了的关于中国革命和建设的正确的理\n论原则和经验总结,是中国共产党集体智慧的结晶。"}, {"id": 511, "no": "文字11", "type": "文字题", "source": "必背20题", "question": "社会主义制度确立的意义。[毛]", "answer": "第一,社会主义基本制度的确立,极大地提高了工人阶级和广大劳动人民的积\n极性、创造性,极大地促进了我国\n社会生产力的发展。\n第二,社会主义基本制度的确立,是我国历史上最深刻最伟大的社会变革,使\n广大劳动人民真正成为国家的主\n人。\n第三,社会主义基本制度的确立,对世界格局产生了积极影响。\n第四,社会主义基本制度的确立,是马克思列宁主义关于社会主义革命理论在\n中国的正确运用和创造性的发展。"}, {"id": 512, "no": "文字12", "type": "文字题", "source": "必背20题", "question": "社会主义和谐社会。[江胡]", "answer": "我们要构建的社会主义和谐社会是经济建设、政治建设、文化建设、社会建\n设、生态文明建设协调发展的社会,\n是人与人、人与社会、人与自然整体和谐\n的社会。民主法治、公平正义、诚信友爱、充满活力、安定有序、人与自然和\n谐相处,是构建社会主义和谐社会\n的总要求。"}, {"id": 513, "no": "文字13", "type": "文字题", "source": "必背20题", "question": "新时期爱国统一战线的内容。[习]", "answer": "在长期的革命、建设和改革过程中,已经结成了由中国共产党领导的,有各民\n主党派和各人民团体参加的,包括全体社会主义劳动者、社会主义事业的建设\n者、拥护社会主义的爱国者、拥护祖国统一和致力于中华民族伟大复兴的爱国\n者的广泛的爱国统一战线,这个统一战线是党的事业取得胜利的重要法宝,将\n继续巩固和发展。"}, {"id": 514, "no": "文字14", "type": "文字题", "source": "必背20题", "question": "如何创新治理体制改革。[习]", "answer": "(1) 创新社会治理体制。\n(2) 改进社会治理方式。\n(3) 加强预防和化解社会矛盾机制建设。\n(4) 加强社会心理服务体系建设。\n(5) 加强社区治理体系建设。"}, {"id": 515, "no": "文字15", "type": "文字题", "source": "必背20题", "question": "毛泽东思想关于工业化发展的道路(经济建设的思想)。", "answer": "毛泽东明确提出了中国工业化道路的思想,他更加明确地提出中国工业化道路\n中最重要的问题,就是重工业、轻工业和农业的发展关系问题。\n处理好重工业、轻工业和农业的发展关系,具体而言:\n(1) 要以工业为主导,把重工业作为我国经济建设的重点,同时必须充分注\n意发展农业和轻工业。\n(2) 要以农业为基础、以工业为主导,以农轻重为序发展国民经济。\n(3) 坚持“两条腿走路”的方针。即强调发展工业和发展农业同时并举,重\n工业和轻工业同时并举,中央工业和地方工业同时并举,沿海工业和内地工业\n同时并举,大型企业和中小型企业同时并举,等等。"}, {"id": 516, "no": "文字16", "type": "文字题", "source": "必背20题", "question": "如何理解中国梦的内涵[习]", "answer": "(一)中国梦的本质是国家富强、民族振兴、人民幸福。\n(1) 国家富强,是指我国综合国力进一步增强,中国特色社会主义事业进一\n步发展和完善。\n(2) 民族振兴,就是通过自身的不断发展与强大,继承并创造中华民族的优\n秀文化以及先进的文明成果,进而使中华民族再次处于世界领先的地位,再次\n以高昂的姿态屹立于世界民族之林。\n(3) 人民幸福,就是人民权利保障更加充分、人人得享共同发展,生活在伟\n大祖国和伟大时代的中国人民,共同享有人生出彩的机会,共同享有梦想成真\n的机会,共同享有同祖国和时代一起成长与进步的机会。\n(4) 国家富强、民族振兴、人民幸福三者之间紧密相连。\n(二)中国梦的特点。\n(1) 把国家的追求、民族的向往、人民的期盼融为一体,体现了中华民族和\n中国人民的整体利益,表达了每一个中华儿女的共同愿景,是中华民族团结奋\n斗的最大公约数。\n(2) 把国家、民族和个人作为一个命运共同体,把国家利益、民族利益和每\n个人的具体利益紧紧联系在一起,体现了中华民族的“家国天下”情怀。\n(3) 中国梦归根到底是人民的梦。\n(4) 中国梦是国家的梦、民族的梦,也是每一个中国人的梦。\n(5) 中国梦与世界各国人民的美好梦想相通。"}, {"id": 517, "no": "文字17", "type": "文字题", "source": "必背20题", "question": "简述实现中国梦的途径。[习]", "answer": "奋力实现中国梦,必须坚持以下几个方面:\n(1) 实现中国梦必须走中国道路,即中国特色社会主义道路。\n(2) 实现中国梦必须弘扬中国精神,这就是以爱国主义为核心的民族精神\n和 以改革创新为核心的时代精神。\n(3) 实现中国梦必须凝聚中国力量,这就是全国各族人民大团结的力量。\n(4) 实现中华民族伟大复兴是海内外中华儿女的共同梦想,需要海内外中\n华 儿女紧密团结、共同奋斗。\n(5) 实现中国梦必须实干。\n(6) 实现中国梦任重而道远,需要锲而不舍、驰而不息的艰苦努力。\n(7) 实现中国梦需要和平,只有和平才能实现梦想。"}, {"id": 518, "no": "文字18", "type": "文字题", "source": "必背20题", "question": "如何改善民生。[习]", "answer": "(1) 优先发展教育事业。\n(2) 提高就业质量。\n(3) 提高人民收入水平。\n(4) 加强社会保障体系建设。\n(5) 坚决打赢脱贫攻坚战。\n(6) 实施健康中国战略。"}, {"id": 519, "no": "文字19", "type": "文字题", "source": "必背20题", "question": "“四个全面”-全面深化改革。[习]", "answer": "(1) 紧紧围绕使市场在资源配置中起决定性作用深化经济体制改革;\n(2) 紧紧围绕坚持党的领导、人民当家作主、依法治国有机统一深化政治\n体制改革;\n(3) 紧紧围绕建设社会主义核心价值体系、社会主义文化强国深化文化体\n制改革;\n(4) 紧紧围绕更好保障和改善民生、促进社会公平正义深化社会体制改革;\n(5) 紧紧围绕建设美丽中国深化生态文明体制改革;\n(6) 紧紧围绕提高科学执政、民主执政、依法执政水平深化党的建设制度\n改革。"}, {"id": 520, "no": "文字20", "type": "文字题", "source": "必背20题", "question": "简述“和平统一、一国两制”构想的重大意义。[邓]", "answer": "(1) “一国两制”的构想是邓小平运用辩证唯物主义和历史唯物主义,坚持\n实事求是,把和平共处的原则用之于解决一个国家的统一问题,\n(2) 它既体现了坚持祖国统一、维护国家主权的原则性,又体现了照顾历史\n实际和现实可能的灵活性,是对马克思主义国家学说的创造性发展。\n注意:20 道题只是重点中的重点,不能保证一定考,但要求大家一定掌\n握。"}];

function applyFilters() {
  list = order.map(id => byId.get(String(id))).filter(Boolean).filter(q => {
    if (filter === 'wrong' && !state.wrong.includes(String(q.id))) return false;
    if (filter === 'fav' && !state.fav.includes(String(q.id))) return false;
    if (!['all','wrong','fav'].includes(filter) && q.type !== filter) return false;
    const hay = `${qNo(q)} ${q.type} ${q.question} ${q.answer || ''} ${(q.options||[]).map(o=>o.key+o.text).join(' ')}`.toLowerCase();
    return !query || hay.includes(query.toLowerCase());
  });
  if (idx >= list.length) idx = Math.max(0, list.length - 1);
  renderAll();
}
function renderAll() { renderQuiz(); renderStats(); renderMiniList(); }
function renderQuiz() {
  const root = document.getElementById('quiz');
  selected = new Set();
  answerShown = false;
  if (!list.length) {
    root.innerHTML = `<div class="empty"><h2>没有匹配的题目</h2><p>换个筛选或搜索词试试。</p></div>`;
    return;
  }
  const q = list[idx];
  const favOn = state.fav.includes(String(q.id));
  const prev = state.answers[String(q.id)];
  const progress = `${idx + 1} / ${list.length}`;
  let html = `
    <div class="meta">
      <span class="pill">第 ${qNo(q)} 题</span>
      <span class="pill">${q.type}</span>
      <span class="pill">${q.source || '题库'}</span>
      <span class="pill">${progress}</span>
      ${prev ? `<span class="pill ${prev.correct ? 'good' : 'bad'}">上次：${prev.correct ? '正确' : '错误'}</span>` : ''}
      <button class="star ${favOn ? 'on' : ''}" id="favBtn" title="收藏/取消收藏">★</button>
    </div>
    <h2 class="question">${escapeHTML(q.question)}</h2>`;

  if (isChoice(q)) {
    html += `<div class="options">${(q.options || []).map(o => `<button class="option" data-key="${escapeHTML(o.key)}"><span class="key">${escapeHTML(o.key)}</span><span class="optText">${escapeHTML(o.text)}</span></button>`).join('')}</div>`;
    html += `<div class="inlineFeedback" id="inlineFeedback"></div>`;
    html += `<div class="actions">
      <button class="btn" id="prevBtn">上一题</button>
      <button class="btn primary" id="submitBtn">提交答案</button>
      <button class="btn" id="showBtn">直接看答案</button>
      <span class="spacer"></span>
      <button class="btn" id="nextBtn">下一题</button>
    </div>`;
  } else if (q.type === '填空题') {
    html += `<div class="answerbox"><input id="fillInput" placeholder="在这里输入答案，可直接回车提交" /></div>`;
    html += `<div class="actions"><button class="btn" id="prevBtn">上一题</button><button class="btn primary" id="submitBtn">提交答案</button><button class="btn" id="showBtn">显示答案</button><span class="spacer"></span><button class="btn" id="nextBtn">下一题</button></div><div class="reference" id="reference">${escapeHTML(q.answer)}</div>`;
  } else {
    html += `<div class="answerbox"><textarea id="textInput" placeholder="先自己默写/回忆，再点显示参考答案"></textarea><div class="reference" id="reference">${escapeHTML(q.answer)}</div></div>`;
    html += `<div class="actions"><button class="btn" id="prevBtn">上一题</button><button class="btn primary" id="showBtn">显示参考答案</button><button class="btn good" id="markRight">标记会了</button><button class="btn bad" id="markWrong">加入错题</button><span class="spacer"></span><button class="btn" id="nextBtn">下一题</button></div>`;
  }
  root.innerHTML = html;
  bindQuizEvents(q);
}
function bindQuizEvents(q) {
  document.getElementById('favBtn')?.addEventListener('click', () => toggleFav(q));
  document.getElementById('prevBtn')?.addEventListener('click', prevQ);
  document.getElementById('nextBtn')?.addEventListener('click', nextQ);
  document.getElementById('showBtn')?.addEventListener('click', () => showAnswer(q));
  document.getElementById('submitBtn')?.addEventListener('click', () => submitAnswer(q));
  document.getElementById('markRight')?.addEventListener('click', () => record(q, true, '已标记会了'));
  document.getElementById('markWrong')?.addEventListener('click', () => record(q, false, '已加入错题本'));
  if (isChoice(q)) {
    document.querySelectorAll('.option').forEach(btn => btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      if (q.type === '多选题') {
        selected.has(k) ? selected.delete(k) : selected.add(k);
      } else {
        selected = new Set([k]);
      }
      document.querySelectorAll('.option').forEach(b => b.classList.toggle('selected', selected.has(b.dataset.key)));
      if (q.type === '单选题' || q.type === '判断题') submitAnswer(q);
    }));
  }
  document.getElementById('fillInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(q); });
}
function submitAnswer(q) {
  if (q.type === '填空题') {
    const val = document.getElementById('fillInput')?.value || '';
    if (!val.trim()) return toast('先输入答案，或点“显示答案”。');
    const ok = normalizeAnswer(val) === normalizeAnswer(q.answer);
    record(q, ok, val);
    if (ok) {
      nextQ();
    } else {
      const ref = document.getElementById('reference');
      if (ref) ref.style.display = 'block';
      setInlineFeedback(`答错了。正确答案：\n${answerText(q)}`, 'bad');
    }
    return;
  }
  if (!isChoice(q)) return;
  if (!selected.size) return toast('先选择一个答案。');
  const chosen = Array.from(selected).sort().join('');
  const ok = chosen === String(q.answer).split('').sort().join('');
  record(q, ok, chosen);
  if (ok) {
    nextQ();
  } else {
    markOptions(q, chosen);
    if (q.type === '多选题') {
      setInlineFeedback(`答错了。红色=你错选的选项；绿色=正确选项（包括漏选项）。\n正确答案：\n${answerText(q)}`, 'bad');
    } else {
      setInlineFeedback(`答错了。正确答案：\n${answerText(q)}`, 'bad');
    }
  }
}
function markOptions(q, chosen='') {
  const ans = new Set(String(q.answer).split('').filter(Boolean));
  const cho = new Set(String(chosen).split('').filter(Boolean));
  document.querySelectorAll('.option').forEach(b => {
    const k = b.dataset.key;
    const isAnswer = ans.has(k);
    const isChosen = cho.has(k);
    b.classList.remove('correct', 'wrong', 'picked-correct', 'picked-wrong', 'missed-correct');
    b.querySelectorAll('.resultTag').forEach(tag => tag.remove());

    if (isAnswer) {
      b.classList.add('correct');
      b.classList.add(isChosen ? 'picked-correct' : 'missed-correct');
      addResultTag(b, isChosen ? '已选正确' : '漏选正确', 'good');
    } else if (isChosen) {
      b.classList.add('wrong', 'picked-wrong');
      addResultTag(b, '错选', 'bad');
    }
  });
}
function addResultTag(optionEl, text, type) {
  const target = optionEl.querySelector('.optText') || optionEl;
  const tag = document.createElement('span');
  tag.className = `resultTag ${type}`;
  tag.textContent = text;
  target.appendChild(tag);
}
function setInlineFeedback(msg, type='info') {
  const root = document.getElementById('quiz');
  if (!root) return;
  let el = document.getElementById('inlineFeedback');
  if (!el) {
    el = document.createElement('div');
    el.id = 'inlineFeedback';
    el.className = 'inlineFeedback';
    root.appendChild(el);
  }
  el.textContent = msg;
  el.className = `inlineFeedback ${type}`;
  el.style.display = 'block';
}
function showAnswer(q) {
  if (isChoice(q)) {
    markOptions(q, Array.from(selected).join(''));
    setInlineFeedback(`正确答案：\n${answerText(q)}`, 'info');
  } else {
    const ref = document.getElementById('reference');
    if (ref) ref.style.display = 'block';
    if (q.type === '填空题') setInlineFeedback(`正确答案：\n${answerText(q)}`, 'info');
  }
}
function record(q, correct, chosen) {
  state.answers[String(q.id)] = {correct, chosen, time: Date.now()};
  const sid = String(q.id);
  state.wrong = state.wrong.filter(x => x !== sid);
  if (!correct) state.wrong.push(sid);
  saveState();
  renderStats();
}
function showResult(q, ok, chosen) {
  const d = document.getElementById('resultDialog');
  const title = document.getElementById('modalTitle');
  const text = document.getElementById('modalText');
  const ans = document.getElementById('modalAns');
  title.textContent = ok === true ? '答对了' : ok === false ? '答错了' : '参考答案';
  title.style.color = ok === true ? 'var(--good)' : ok === false ? 'var(--bad)' : 'var(--brand)';
  text.textContent = `你的答案：${chosen || '未作答'}`;
  ans.textContent = `正确答案：
${answerText(q)}`;
  if (!d.open) d.showModal();
}
function toast(msg) {
  setInlineFeedback(msg, 'info');
}
function nextQ() { if (!list.length) return; idx = (idx + 1) % list.length; renderQuiz(); }
function prevQ() { if (!list.length) return; idx = (idx - 1 + list.length) % list.length; renderQuiz(); }
function toggleFav(q) {
  const sid = String(q.id);
  state.fav = state.fav.includes(sid) ? state.fav.filter(x => x !== sid) : [...state.fav, sid];
  saveState(); renderQuiz(); renderStats();
}
function renderStats() {
  const total = QUESTIONS.length;
  const done = Object.keys(state.answers).length;
  const right = Object.values(state.answers).filter(a => a.correct).length;
  const wrong = state.wrong.length;
  const rate = done ? Math.round(right / done * 100) : 0;
  document.getElementById('totalBadge').textContent = `共 ${total} 题｜当前 ${list.length || total} 题`;
  document.getElementById('doneNum').textContent = done;
  document.getElementById('rightNum').textContent = right;
  document.getElementById('wrongNum').textContent = wrong;
  document.getElementById('rateNum').textContent = `${rate}%`;
  document.getElementById('progressBar').style.width = `${Math.min(100, Math.round(done / total * 100))}%`;
  document.getElementById('progressText').textContent = done ? `整体完成 ${done} / ${total}，收藏 ${state.fav.length} 题。` : '尚未开始。';
}
function renderMiniList() {
  const box = document.getElementById('miniList');
  if (!list.length) { box.innerHTML = '<p class="hint">当前没有题。</p>'; return; }
  const start = Math.max(0, idx - 4);
  const items = list.slice(start, start + 9);
  box.innerHTML = items.map(q => `<div class="mini"><span>${qNo(q)}｜${q.type}</span><button data-id="${q.id}">跳转</button></div>`).join('');
  box.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { idx = list.findIndex(q => String(q.id) === b.dataset.id); renderQuiz(); renderMiniList(); }));
}
function escapeHTML(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function jumpTo(value) {
  const v = value.trim().toLowerCase();
  if (!v) return;
  let found = list.findIndex(q => String(q.no).toLowerCase() === v || String(q.id) === v || (`文字${q.id-500}`) === v);
  if (found < 0) found = QUESTIONS.findIndex(q => String(q.no).toLowerCase() === v || String(q.id) === v);
  if (found >= 0) {
    const target = QUESTIONS[found];
    const pos = list.findIndex(q => String(q.id) === String(target.id));
    if (pos >= 0) { idx = pos; renderAll(); } else { filter = 'all'; document.querySelectorAll('#filters .btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all')); applyFilters(); idx = list.findIndex(q => String(q.id) === String(target.id)); renderAll(); }
  } else toast('没找到这个题号。');
}

document.querySelectorAll('#filters .btn[data-filter]').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('#filters .btn[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); filter = btn.dataset.filter; idx = 0; applyFilters();
}));
document.getElementById('search').addEventListener('input', e => { query = e.target.value.trim(); idx = 0; applyFilters(); });
document.getElementById('shuffleBtn').addEventListener('click', () => {
  for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [order[i], order[j]] = [order[j], order[i]]; }
  idx = 0; applyFilters();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('确定清空作答记录、错题和收藏吗？')) { state = {answers:{}, wrong:[], fav:[]}; saveState(); renderAll(); }
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const wrongQs = state.wrong.map(id => byId.get(String(id))).filter(Boolean);
  if (!wrongQs.length) return toast('错题本为空。');
  const text = wrongQs.map(q => `第${qNo(q)}题【${q.type}】
${q.question}
正确答案：${answerText(q)}
`).join('\n---\n');
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = '毛概题库_错题导出.txt'; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById('jumpInput').addEventListener('keydown', e => { if (e.key === 'Enter') jumpTo(e.target.value); });
document.getElementById('closeModal').addEventListener('click', () => document.getElementById('resultDialog').close());
document.getElementById('modalNext').addEventListener('click', () => { document.getElementById('resultDialog').close(); nextQ(); });
document.addEventListener('keydown', e => {
  if (e.target && ['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft') prevQ();
});

applyFilters();
</script>
</body>
</html>
